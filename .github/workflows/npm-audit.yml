name: npm Audit

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.0.0
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit fix
        run: npm audit fix

      - name: Create Pull Request
        run: |
          if git diff --quiet; then
            echo "No vulnerabilities fixed, nothing to commit."
            exit 0
          fi
          BRANCH="npm-audit-fix/$(date +%Y-%m-%d)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add package.json package-lock.json
          git commit -m "fix(deps): apply npm audit fix ($(date +%Y-%m-%d))"
          git push origin "$BRANCH"
          gh pr create \
            --title "fix(deps): apply npm audit fix" \
            --body "Automated daily PR to fix npm audit vulnerabilities. Generated by the npm-audit workflow." \
            --base main \
            --head "$BRANCH"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
